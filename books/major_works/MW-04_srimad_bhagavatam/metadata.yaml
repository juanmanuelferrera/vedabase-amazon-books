description: |
  The ripened fruit of Vedic literature, Srimad-Bhagavatam is the
  complete science of God. Written by Srila Vyasadeva, it covers
  the entire history of the universe, the science of yoga, and
  the activities of the Lord's incarnations. Srila Prabhupada
  translated and commented on this work until the Thirteenth
  Chapter of the Tenth Canto. Complete with original Sanskrit,
  transliteration, and purports.

description: |
  The Bhagavad-gita is universally renowned as the jewel of India's
  spiritual wisdom. Spoken by Lord Sri Krishna to His intimate devotee
  Arjuna, the Gita's seven hundred verses provide a definitive guide
  to the science of self-realization. This complete edition includes
  the original Sanskrit text, Roman transliteration, English word-for-word
  meanings, translation, and elaborate purports by His Divine Grace
  A.C. Bhaktivedanta Swami Prabhupada.

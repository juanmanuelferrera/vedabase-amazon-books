description: |
  The authorized biography of Sri Caitanya Mahaprabhu (1486-1534),
  written by Srila Krishnadasa Kaviraja Goswami. This monumental
  work describes the life, teachings, and mission of Lord Caitanya,
  who is Krishna Himself appearing as His own devotee to teach
  the chanting of the holy names. Complete with original Bengali
  text, Roman transliteration, and elaborate purports.

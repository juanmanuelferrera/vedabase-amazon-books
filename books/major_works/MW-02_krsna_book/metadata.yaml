description: |
  The complete story of Lord Krishna's transcendental activities,
  from His appearance in the prison of King Kamsa to His departure
  from this world. Based on the Tenth Canto of Srimad-Bhagavatam,
  this book brings to life the pastimes of the Supreme Personality
  of Godhead in Vrindavan and Dvaraka. Originally published with
  a foreword by George Harrison.

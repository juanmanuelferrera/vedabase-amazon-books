description: |
  Lord Kapila, an incarnation of the Supreme Personality of Godhead,
  appeared in this world to teach His mother Devahuti the science
  of self-realization. His teachings, known as Sankhya philosophy,
  form a complete system of metaphysical knowledge combined with
  the practice of devotional service.

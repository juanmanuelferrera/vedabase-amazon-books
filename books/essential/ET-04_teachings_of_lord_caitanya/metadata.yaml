description: |
  A summary study of Sri Caitanya Mahaprabhu's teachings, presenting
  the essence of Gaudiya Vaisnava philosophy. Lord Caitanya appeared
  in Bengal 500 years ago to teach love of God through the chanting
  of the holy names. This book covers His instructions on devotional
  service, the nature of the soul, and the ultimate goal of life.

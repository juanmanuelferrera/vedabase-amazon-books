description: |
  A summary study of Srila Rupa Gosvami's Bhakti-rasamrta-sindhu,
  this book is a complete guide to the practice of bhakti-yoga,
  devotional service to the Supreme Lord. It systematically presents
  the stages of devotional development, from the initial stages
  of faith through the highest perfection of pure love of God.

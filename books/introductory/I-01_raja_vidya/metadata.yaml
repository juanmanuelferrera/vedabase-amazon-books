description: |
  In this compact yet profound work, Srila Prabhupada
  reveals the essence of the Bhagavad-gita's ninth chapter,
  where Lord Krishna declares: "This knowledge is the king
  of education, the most secret of all secrets."

  Raja-vidya illuminates the path of bhakti-yoga as the
  supreme science of self-realization—accessible to all,
  yet rarely understood. Here you will discover why
  devotional service to Krishna is called "the king of
  knowledge" and how it can free you from the cycle
  of birth and death.
glossary:
  - term: "Arjuna"
    definition: "The great warrior to whom Lord Krsna spoke Bhagavad-gita"
  - term: "Bhagavad-gita"
    definition: "The Song of God, spoken by Lord Krsna to Arjuna"
  - term: "Bhagavan"
    definition: "The Supreme Lord, who possesses all opulences in full"
  - term: "Brahman"
    definition: "The impersonal, all-pervading aspect of the Supreme"
  - term: "Krsna"
    definition: "The Supreme Personality of Godhead"
  - term: "Mahatma"
    definition: "A great soul; one who has surrendered to the Lord"
  - term: "Maya"
    definition: "Illusion; the energy that deludes the living entity"
  - term: "Parampara"
    definition: "Disciplic succession; the chain of spiritual masters"
  - term: "Raja-vidya"
    definition: "The king of knowledge; devotional service to the Lord"
  - term: "Samsara"
    definition: "The cycle of repeated birth and death"
